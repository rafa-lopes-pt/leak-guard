# GitHub Actions workflow -- server-side security scanning
# Deploy to each repo as .github/workflows/secret-scan.yml
#
# Requires:
#   - SECURITY_KEY org secret (passphrase for decrypting security-keywords.enc)
#   - .gitleaks.toml in repo root
#   - .security-filetypes in repo root
#   - security-keywords.enc in repo root (if using keyword scanning)

name: Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for gitleaks

      - name: Get changed files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only --diff-filter=ACMRT ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | tr '\n' ' ')
          else
            FILES=$(git diff --name-only --diff-filter=ACMRT HEAD~1 HEAD 2>/dev/null | tr '\n' ' ' || echo "")
          fi
          echo "files=${FILES}" >> "$GITHUB_OUTPUT"

      - name: File type check
        if: steps.changed.outputs.files != ''
        run: |
          CONFIG=".security-filetypes"
          if [ ! -f "$CONFIG" ]; then
            echo "No .security-filetypes config found, skipping file type check."
            exit 0
          fi

          BLOCKED=0
          CURRENT_SECTION=""

          # Parse config into arrays
          declare -a BLOCKED_EXTS=()
          declare -a BLOCKED_MIMES=()
          declare -a ALLOWED_TYPES=()
          declare -a ALLOWED_FILES=()

          while IFS= read -r line || [[ -n "$line" ]]; do
            line=$(echo "$line" | sed 's/#.*//' | xargs)
            [[ -z "$line" ]] && continue

            if [[ "$line" =~ ^\[(.+)\]$ ]]; then
              CURRENT_SECTION="${BASH_REMATCH[1]}"
              continue
            fi

            case "$CURRENT_SECTION" in
              extensions)    BLOCKED_EXTS+=("$line") ;;
              mime-types)    BLOCKED_MIMES+=("$line") ;;
              allowed-types) ALLOWED_TYPES+=("$line") ;;
              allowed-files) ALLOWED_FILES+=("$line") ;;
            esac
          done < "$CONFIG"

          for filepath in ${{ steps.changed.outputs.files }}; do
            [ -f "$filepath" ] || continue

            # Check allowed-files first (overrides everything)
            SKIP=0
            for allowed in "${ALLOWED_FILES[@]+"${ALLOWED_FILES[@]}"}"; do
              if [[ "$filepath" == "$allowed" ]]; then
                SKIP=1
                break
              fi
            done
            [[ $SKIP -eq 1 ]] && continue

            # Check extension
            filename=$(basename "$filepath")
            ext=""
            if [[ "$filename" == *.* ]]; then
              ext=".${filename##*.}"
              ext=$(echo "$ext" | tr '[:upper:]' '[:lower:]')
            fi

            for blocked_ext in "${BLOCKED_EXTS[@]+"${BLOCKED_EXTS[@]}"}"; do
              if [[ "$ext" == "$blocked_ext" ]]; then
                echo "BLOCKED: ${filepath} -- file type not allowed: ${ext}"
                BLOCKED=1
              fi
            done

            # Check MIME type
            MIME=$(file --mime-type -b "$filepath" 2>/dev/null || echo "unknown")

            # Check allowed MIME types first
            MIME_ALLOWED=0
            for allowed_mime in "${ALLOWED_TYPES[@]+"${ALLOWED_TYPES[@]}"}"; do
              if [[ "$MIME" == "$allowed_mime" ]]; then
                MIME_ALLOWED=1
                break
              fi
            done
            [[ $MIME_ALLOWED -eq 1 ]] && continue

            # Check blocked MIME prefixes
            for blocked_mime in "${BLOCKED_MIMES[@]+"${BLOCKED_MIMES[@]}"}"; do
              if [[ "$MIME" == ${blocked_mime}* ]]; then
                echo "BLOCKED: ${filepath} -- unscannable file detected (${MIME})."
                echo "  Binary files must be added inside an encrypted .7z archive."
                echo "  Run: 7z a -p -mhe=on archive.7z ${filepath}"
                BLOCKED=1
                break
              fi
            done
          done

          if [[ $BLOCKED -eq 1 ]]; then
            echo ""
            echo "File type check failed. Remove blocked files or add exceptions to .security-filetypes [allowed-files]."
            exit 1
          fi
          echo "File type check passed."

      - name: Keyword scan
        if: steps.changed.outputs.files != ''
        env:
          SECURITY_KEY: ${{ secrets.SECURITY_KEY }}
        run: |
          ENC_FILE="security-keywords.enc"

          if [ ! -f "$ENC_FILE" ]; then
            echo "No encrypted keyword list found, skipping keyword scan."
            exit 0
          fi

          if [ -z "${SECURITY_KEY:-}" ]; then
            echo "WARNING: SECURITY_KEY secret not configured. Skipping keyword scan."
            echo "Set the SECURITY_KEY org secret to enable keyword scanning in CI."
            exit 0
          fi

          TEMP_KEYWORDS=$(mktemp)
          trap "rm -f '$TEMP_KEYWORDS'" EXIT

          echo "$SECURITY_KEY" > /tmp/.ci-security-key
          if ! openssl enc -d -aes-256-cbc -pbkdf2 \
              -in "$ENC_FILE" \
              -pass "file:/tmp/.ci-security-key" \
              -out "$TEMP_KEYWORDS" 2>/dev/null; then
            echo "ERROR: Failed to decrypt keyword list. Check the SECURITY_KEY secret."
            rm -f /tmp/.ci-security-key
            exit 1
          fi
          rm -f /tmp/.ci-security-key

          FOUND=0
          while IFS= read -r keyword || [[ -n "$keyword" ]]; do
            [[ -z "$keyword" || "$keyword" =~ ^[[:space:]]*# ]] && continue
            keyword=$(echo "$keyword" | xargs)
            [[ -z "$keyword" ]] && continue

            for filepath in ${{ steps.changed.outputs.files }}; do
              [ -f "$filepath" ] || continue
              if grep -qil "$keyword" "$filepath" 2>/dev/null; then
                echo "BLOCKED: Keyword match in ${filepath}"
                FOUND=1
              fi
            done
          done < "$TEMP_KEYWORDS"

          rm -f "$TEMP_KEYWORDS"

          if [[ $FOUND -eq 1 ]]; then
            echo ""
            echo "Keyword scan failed. Remove sensitive terms before committing."
            exit 1
          fi
          echo "Keyword scan passed."

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Secret scan (gitleaks)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gitleaks detect \
              --source . \
              --config .gitleaks.toml \
              --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.sha }}" \
              --verbose
          else
            gitleaks detect \
              --source . \
              --config .gitleaks.toml \
              --log-opts="HEAD~1..HEAD" \
              --verbose
          fi
          echo "Secret scan passed."
